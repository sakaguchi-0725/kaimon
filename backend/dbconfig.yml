development:
  dialect: postgres
  datasource: host=${POSTGRES_HOST} port=${POSTGRES_PORT} dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} sslmode=disable
  dir: migrations
  table: migrations

test:
  dialect: postgres
  datasource: host=${TEST_POSTGRES_HOST} port=${TEST_POSTGRES_PORT} dbname=${TEST_POSTGRES_DB} user=${TEST_POSTGRES_USER} password=${TEST_POSTGRES_PASSWORD} sslmode=disable
  dir: migrations
  table: migrations
